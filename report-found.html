<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Found Item</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1f5b">
    <link rel="icon" href="images/icon-192.png">
    <link rel="apple-touch-icon" href="images/apple-icon.png">
</head>
<body>

<nav>
    <div class="logo">
        <img src="images/logo.png" alt="Logo">
        <div>
            <h3>SMART CAMPUS</h3>
            <small>LOST & FOUND SYSTEM</small>
        </div>
    </div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="report-lost.html">Report Lost</a></li>
        <li><a href="report-found.html">Report Found</a></li>
        <li><a href="search.html">Search</a></li>
    </ul>
</nav>

<section class="form-container">

    <h1>Report Found Item</h1>

    <form id="foundForm">

        <div class="form-grid">

            <div>
                <label>Item Name</label>
                <input type="text" id="foundItemName" required>
            </div>

            <div>
                <label>Location Found</label>
                <input type="text" id="foundLocation" required>
            </div>

            <div>
                <label>Category</label>
                <select id="foundCategory" required>
                    <option value="">Select Category</option>
                    <option>Wallet</option>
                    <option>Phone</option>
                    <option>Keys</option>
                    <option>Student ID</option>
                    <option>Bag</option>
                </select>
            </div>

        </div>

        <label>Description</label>
        <textarea id="foundDescription"></textarea>

        <label>Date Found</label>
        <input type="date" id="foundDate" required>

        <button type="submit" class="submit-btn">
            Submit Found Report
        </button>

    </form>

</section>

<script src="script.js"></script>

</body>
</html>
